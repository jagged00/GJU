l_english:
  cultivation_constitution_lottery_events.011.t:0 "A Flicker Beneath Heaven"
  cultivation_constitution_lottery_events.011.desc:0 "During meditation, your sea of consciousness ripples without warning. For a heartbeat, you glimpse a broken jade slip half-buried in old dust, and hear an impossible whisper about the marrow-forging dao. Whether it is a sudden hint of inspiration or the remnant will of an ancient artifact, an opportunity stands before you—dangerous, dazzling, and brief."

  cultivation_constitution_lottery_events.011.a:0 "Follow the jade-slip hint and refine this chance with steady breath-cycles."
  cultivation_constitution_lottery_events.011.b:0 "Let this karmic vision pass; my dao-heart must remain stable."
  cultivation_constitution_lottery_events.011.c:0 "Break the bottleneck by force—life and death before the Grand Dao!"
