l_english:
  trait_yang_constitution:0 "Yang Constitution"
  trait_yang_constitution_desc:0 "This body burns with pure yang essence, strengthening martial force and furnace-like vitality. In dual cultivation, it resonates powerfully with complementary yin practitioners."
  trait_yang_constitution_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] bears a blazing Yang Constitution, with fierce qi circulation and explosive power."

  trait_yin_constitution:0 "Yin Constitution"
  trait_yin_constitution_desc:0 "This body gathers lunar yin qi with unusual ease, granting calm control and deep spiritual compatibility. In dual cultivation, it harmonizes with complementary yang practitioners."
  trait_yin_constitution_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] bears a tranquil Yin Constitution, with smooth meridian flow and profound spiritual affinity."

  trait_poison_constitution:0 "Poison Constitution"
  trait_poison_constitution_desc:0 "A feared physique tempered by venom and miasma. Toxic qi that would kill ordinary cultivators instead becomes nourishment, sharpening intrigue and survival instincts."
  trait_poison_constitution_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] has awakened a Poison Constitution, turning deadly toxins into cultivation fuel."

  trait_lightning_constitution:0 "Lightning Constitution"
  trait_lightning_constitution_desc:0 "Thunder-etched meridians let this body endure violent qi surges and tribulation-like pressure. Breakthroughs are still dangerous, but the heavens answer more readily."
  trait_lightning_constitution_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] has a Lightning Constitution, their qi crackling like stormfire through every channel."

  trait_dragon_bloodline:0 "Dragon Bloodline"
  trait_dragon_bloodline_desc:0 "A draconic legacy slumbers in this blood. Though incomplete, each increase in purity awakens greater might, vitality, and sovereign presence."
  trait_dragon_bloodline_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] carries ancient dragon blood, potent but not yet fully awakened."
  trait_track_dragon_bloodline:0 "Purity"
  trait_track_dragon_bloodline_desc:0 "The refinement and concentration of draconic essence in the bloodline."

  trait_dragon_body_constitution:0 "Dragon Body Constitution"
  trait_dragon_body_constitution_desc:0 "The draconic legacy has fully awakened. Flesh, bone, and meridians have transformed into a tyrannical battle body with overwhelming vitality and pressure."
  trait_dragon_body_constitution_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] has forged the Dragon Body Constitution and radiates an overwhelming, sovereign aura."
