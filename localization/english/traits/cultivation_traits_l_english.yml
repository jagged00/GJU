  righteous_path_name:0 "Righteous Path"
  righteous_path_desc:0 "To walk the path of righteousness is to wield power not for selfish gain or unrestrained vengeance, but to protect the innocent and uphold justice. Though the world may be filled with turmoil and suffering, the true strength lies in compassion and honor. A righteous cultivator does not fear standing alone against a hundred foes if it means defending the weak or averting disaster. Revenge is a fleeting desire, but righteousness endures across generations. I will strike down evil not for glory or hatred, but for the greater good of all. If a thousand villains seek to destroy the peace, I will stand in their way, unyielding and resolute. The world may rise against me, but I will never abandon the path of light."

  demonic_path_name:0 "Demonic Path"
  demonic_path_desc:0 "Since I started walking on the demonic path, I have never feared offending others. As long as I continue to get stronger, what is revenge? If ten people want revenge, I will kill ten; if a hundred people want revenge, I will kill a hundred. If the whole world wants revenge, I will exterminate the whole world!"

